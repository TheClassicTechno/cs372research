# supported_tickers.yaml
#
# Canonical supported ticker universe for quarterly snapshot pipeline.
#
# Universe size: 19 tickers
#
# Design rationale:
# - Mix of cyclical + defensive + financial + energy + healthcare
# - Includes Mega-cap Tech leaders
# - Includes Financial systemically important banks
# - Includes Consumer, Industrial, Energy, and REIT exposure
# - Provides macro regime sensitivity diversity for CS372 experiments
#
# This file is the single source of truth for allowed tickers in:
#   - quarterly_quarterly_json.py
#   - rebalance_runner.py
#   - simulation pipeline
#
# DO NOT modify without versioning the universe in research logs.

supported_tickers:

  # --------------------------
  # Industrials / Cyclical
  # --------------------------
  - symbol: CAT
    sector: Industrials
    description: Caterpillar — Global heavy machinery / cyclical capex proxy

  - symbol: DAL
    sector: Industrials
    description: Delta Air Lines — Travel demand and consumer cycle proxy

  # --------------------------
  # Financials
