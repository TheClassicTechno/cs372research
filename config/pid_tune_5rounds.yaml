# ============================================================================
# PID Tuning Experiment 6: 5 rounds (test Ki accumulation)
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/pid_tune_5rounds.yaml
#
# Same Full PID gains but with max_rounds=5 instead of 3.
# With more rounds, Ki has more time to accumulate past errors.
# Expect: integral term becomes more visible in PID step output.
# Also tests whether PID correctly terminates early when converged.

dataset_path: "data/cases"

top_n_news: 5

tickers:
  - NVDA

quarters:
  - Q1

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3

  debate_roles:
    - macro
    - value

  max_rounds: 5

  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5

  pid_propose: false
  pid_critique: true
  pid_revise: true

  pid_log_metrics: true
  pid_log_llm_calls: false

broker:
  initial_cash: 100000.0
