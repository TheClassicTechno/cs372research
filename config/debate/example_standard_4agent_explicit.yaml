# ============================================================================
# Example: Standard 4-Agent Debate — Explicit Default Values
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/debate/example_standard_4agent_explicit.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"

num_episodes: 1

# --- Who debates ---
agents:
  macro: "macro_standard"
  value: "value_standard"
  technical: "technical_standard"
  risk: "risk_standard"
judge_profile: "judge_standard"

# --- How to debate ---
debate_setup:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3

  max_rounds: 7

  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  logging_mode: "debug"
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
