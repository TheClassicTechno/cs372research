# ============================================================================
# Example: 2-Agent Debate — Macro + Risk only
# ============================================================================
# Demonstrates:
#   - Using only 2 agents for a focused debate
#   - Mixing agents role prompts with the diverse_agents profile
#
# Only macro and risk agents debate. Fewer agents = faster, cheaper runs.
# Useful for focused experiments on macro-risk interaction.
#
# Run with:
#   python run_simulation.py --agents config/debate/example_2agent_macro_risk.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"

tickers:
  - JPM
  - GS
  - XOM
  - UNH
  - CAT

# Allocation constraints enforced on final portfolio output:
#   max_weight:     max fraction any single ticker can receive (0.40 = 40%)
#   min_holdings:   minimum number of tickers with weight > 0
#   fully_invested: if true, weights must sum to 1.0 (no cash reserve)
#   max_tickers:    upper bound on universe size (validation only)
allocation_constraints:
  max_weight: 0.40
  min_holdings: 3
  fully_invested: true
  max_tickers: 10

num_episodes: 1

# --- Who debates ---
agents:
  macro: "macro_angry_tech_bull"
  risk: "risk_angry_recession_doom"
judge_profile: "judge_standard"

# --- How to debate ---
debate_setup:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  crit_llm_model: "gpt-5"
  role_llms:
    macro:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
    risk:
      provider: "openai"
      model: "gpt-5-mini"
    judge:
      provider: "openai"
      model: "gpt-5"
  temperature: 0.3
  max_retries: 3
  max_rounds: 3

  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.7

  logging_mode: "debug"
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
