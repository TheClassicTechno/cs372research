# ============================================================================
# Example: Non-Standard Roles — Sentiment + Devil's Advocate + Value
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/debate/example_sentiment_devils_advocate.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"

num_episodes: 1

# --- Who debates ---
agents:
  value: "value_standard"
  sentiment: "sentiment_standard"
  devils_advocate: "devils_advocate_standard"
judge_profile: "judge_standard"

# --- How to debate ---
debate_setup:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3
  max_rounds: 3

  pid_enabled: true

  logging_mode: "debug"

broker:
  initial_cash: 100000.0
