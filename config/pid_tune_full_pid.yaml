# ============================================================================
# PID Tuning Experiment 4: Full PID (all three terms)
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/pid_tune_full_pid.yaml
#
# Kp=0.15, Ki=0.01, Kd=0.03: full PID with derivative damping.
# Ki=0.01, Kd=0.03 chosen to pass stability check (T_max=20, mu=1.0).
# Kd smooths out sudden quality swings (prevents β from jerking).
# Expect: most stable β trajectory, but slowest to react.

dataset_path: "data/cases"

top_n_news: 5

tickers:
  - NVDA

quarters:
  - Q1

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3

  debate_roles:
    - macro
    - value

  max_rounds: 3

  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5

  pid_log_metrics: true
  pid_log_llm_calls: false

broker:
  initial_cash: 100000.0
