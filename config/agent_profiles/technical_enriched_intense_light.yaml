  critique:
    template: phases/critique_allocation_with_enumeration_technical_enriched.txt
    sections: [preamble, context, agent_data, task, output_format]
  revise:
    template: phases/revision_allocation_with_enumeration_technical_enriched.txt
    sections: [preamble, context, agent_data, task, technical_revision_guidelines, output_format]
