# Enriched technical agent (intense + light) — light system contract, intense role.
system_prompts:
  propose:
    - system_contract/enriched_reasoning_debate_protocol_light.txt
    - roles/technical_enriched_intense.txt
  critique:
    - system_contract/enriched_reasoning_debate_protocol_light.txt
    - roles/technical_enriched_intense.txt
    - tone
  revise:
    - system_contract/enriched_reasoning_debate_protocol_light.txt
    - roles/technical_enriched_intense.txt
    - tone

user_prompts:
  propose:
    template: phases/proposal_allocation_with_enumeration_technical_enriched.txt
