# Enriched value agent — Bayesian regime updating, self-contained reasoning.
system_prompts:
  propose:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/value_enriched.txt
  critique:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/value_enriched.txt
    - tone
  revise:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/value_enriched.txt
    - tone

user_prompts:
  propose:
    template: phases/proposal_allocation_with_enumeration_value_enriched.txt
    sections: [context, task, reasoning_structure, portfolio_construction, output_format]
  critique:
    template: phases/critique_allocation_with_enumeration_value_enriched.txt
    sections: [preamble, context, agent_data, task, output_format]
  revise:
    template: phases/revision_allocation_with_enumeration_value_enriched.txt
    sections: [preamble, context, agent_data, task, revision_guidelines, output_format]
