# Enriched risk agent (intense variant, v2) — adds critique_responses to revision schema.
system_prompts:
  propose:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched_intense.txt
  critique:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched_intense.txt
    - tone
  revise:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched_intense.txt
    - tone

user_prompts:
  propose:
    template: phases/proposal_allocation_with_enumeration_risk_enriched.txt
    sections: [context, task, reasoning_structure, portfolio_construction, output_format]
  critique:
    template: phases/critique_allocation_with_enumeration_risk_enriched.txt
    sections: [preamble, context, agent_data, task, output_format]
  revise:
    template: phases/revision_allocation_with_enumeration_risk_enriched_v2.txt
    sections: [preamble, context, agent_data, task, risk_revision_guidelines, output_format]
