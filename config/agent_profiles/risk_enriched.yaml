# Enriched risk agent — Bayesian regime updating, self-contained reasoning.
system_prompts:
  propose:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched.txt
  critique:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched.txt
    - tone
  revise:
    - system_contract/enriched_reasoning_debate_protocol.txt
    - roles/risk_enriched.txt
    - tone

# "sections" = ordered list of ---SECTION: name--- markers from the template file.
# These control which sections are included and in what order.
# Available Jinja2 template variables per phase (defined in multi_agent/prompts/__init__.py):
#   propose:  {{ context }}, {{ sector_constraints }}, {{ allocation_output_instructions_enumerated }}
#   critique: {{ role }}, {{ context }}, {{ my_proposal }}, {{ my_proposal_v2 }},
#             {{ others_text }}, {{ others_text_v2 }}, {{ sector_constraints }}
#   revise:   {{ role }}, {{ context }}, {{ my_proposal }}, {{ my_proposal_v2 }},
#             {{ critiques_text }}, {{ critiques_text_v2 }}, {{ causal_claim_format }},
#             {{ forced_uncertainty }}, {{ sector_constraints }}
user_prompts:
  propose:
    template: phases/proposal_allocation_with_enumeration_risk_enriched.txt
    sections: [context, task, reasoning_structure, portfolio_construction, output_format]
  critique:
    template: phases/critique_allocation_with_enumeration_risk_enriched.txt
    sections: [preamble, context, agent_data, task, output_format]
  revise:
    template: phases/revision_allocation_with_enumeration_risk_enriched.txt
    sections: [preamble, context, agent_data, task, risk_revision_guidelines, output_format]
