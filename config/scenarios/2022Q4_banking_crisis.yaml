# ============================================================================
# Scenario: 2023 Banking Crisis vs AI Breakout Debate (Q4 2022 Data → Q1 Investment)
# ============================================================================
# Demonstrates sector configuration features:
#   - Ticker → sector mapping
#   - Per-sector exposure limits (min/max)
#   - Role-specific sector permissions
#
# Decision point: Start of Q1 2023
# Data available to agents: End of Q4 2022
#
# Narrative tensions:
#   - Banking sector fragility vs systemic stability
#   - AI / tech breakout vs tightening financial conditions
#   - Defensive positioning vs risk-on tech leadership
#   - Energy normalization vs global demand uncertainty
#
# Usage:
#   python run_simulation.py \
#     --agents config/agents/debate_diverse_agents.yaml \
#     --scenario config/scenarios/sector_constrained.yaml

invest_quarter: "2023Q1"

tickers:
  - AAPL
  - MSFT
  - NVDA
  - AMD

  - JPM
  - GS
  - BAC
  - MS

  - XOM
  - CVX
  - COP
  - SLB

  - CAT
  - RTX

  - AMZN
  - TSLA
  - NKE

  - WMT
  - COST
  - PG

  - UNH
  - JNJ

# Sector definitions: every ticker belongs to exactly one sector.
sectors:
  tech:
    - AAPL
    - MSFT
    - NVDA
    - AMD

  energy:
    - XOM
    - CVX
    - COP
    - SLB

  financials:
    - JPM
    - GS
    - BAC
    - MS

  defensive:
    - WMT
    - COST
    - PG

  consumer:
    - AMZN
    - TSLA
    - NKE

  healthcare:
    - UNH
    - JNJ

  industrials:
    - CAT
    - RTX

# Per-sector exposure bounds enforced on the final (judge) allocation.
# Sectors without entries here are unconstrained.
sector_limits:
  tech:
    min: 0.05
    max: 0.35

  energy:
    min: 0.05
    max: 0.30

  financials:
    min: 0.05
    max: 0.30

  defensive:
    min: 0.05
    max: 0.25

  consumer:
    min: 0.05
    max: 0.25

  healthcare:
    min: 0.05
    max: 0.20

  industrials:
    min: 0.05
    max: 0.25

# Role-specific sector permissions.
# Each agent role can only allocate to its allowed sectors.
# Use ["*"] to allow all sectors.
agent_sector_permissions:
  macro:
    - energy
    - financials
    - industrials
    - tech

  value:
    - financials
    - industrials
    - consumer
    - energy

  technical:
    - "*"

  risk:
    - defensive
    - healthcare
    - financials

# Blanket sector cap — no single sector may exceed this weight.
# Composable with sector_limits: the stricter bound wins per sector.
max_sector_weight: 0.40

allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 20