tickers:
  - TSLA    # Consumer / Auto
  - NFLX    # Comm / Media
  - JPM     # Financials
  - GS      # Financials
  - BAC     # Financials
  - UNH     # Healthcare
  - LLY     # Healthcare
  - JNJ     # Healthcare
  - XOM     # Energy
  - CAT     # Industrials
  - DAL     # Industrials / Transport
  - AMT     # Real Estate
  - COST    # Consumer Staples
  - WMT     # Consumer Staples

allocation_constraints:
