# ============================================================================
# Non-Tech Stocks — Debate Agent Simulation (Mock Mode)
# ============================================================================
# Run with:
#   python run_simulation.py --config config/debate_nontech_mock.yaml
#
# Uses the multi-agent debate system in mock mode for non-tech stocks:
# KO (Coca-Cola), BAC (Bank of America), CVX (Chevron), AXP (American Express)

dataset_path: "data/cases"

tickers:
  - KO
  - BAC
  - CVX
  - AXP

num_episodes: 1

# --------------------------------------------------------------------------
# Agent Configuration — Multi-Agent Debate
# --------------------------------------------------------------------------
agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3
  system_prompt_override: "mock"

# --------------------------------------------------------------------------
# Broker Configuration
# --------------------------------------------------------------------------
broker:
  initial_cash: 100000.0
