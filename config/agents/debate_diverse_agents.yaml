# ============================================================================
# Debate Agent Simulation — Diverse Agents + PID Controller (7 rounds)
# ============================================================================
# Each agent uses a structurally different reasoning style to maximize
# cognitive diversity in the debate:
#   macro:     Bayesian regime updating (L2 intervention focus)
#   value:     Inversion-first analysis (L3 counterfactual focus)
#   technical: Quantitative signal scoring (L1 association focus)
#   risk:      Scenario tree analysis (L3 counterfactual + override authority)
#
# Run with:
#   python run_simulation.py --agents config/debate_diverse_agents.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"

tickers:
  - TSLA    # Consumer / Auto
  - NFLX    # Comm / Media
  - JPM     # Financials
  - GS      # Financials
  - BAC     # Financials
  - UNH     # Healthcare
  - LLY     # Healthcare
  - JNJ     # Healthcare
  - XOM     # Energy
  - CAT     # Industrials
  - DAL     # Industrials / Transport
  - AMT     # Real Estate
  - COST    # Consumer Staples
  - WMT     # Consumer Staples

# Allocation constraints enforced on final portfolio output:
#   max_weight:     max fraction any single ticker can receive (0.20 = 20%)
#   min_holdings:   minimum number of tickers with weight > 0
#   fully_invested: if true, weights must sum to 1.0 (no cash reserve)
#   max_tickers:    upper bound on universe size (validation only)
allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 20

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3

  # 7 debate rounds for PID to have room to adjust
  max_rounds: 4

  # --- Prompt profile ---
  # Profiles live in multi_agent/prompts/profiles/<name>.yaml and define which
  # prompt blocks are assembled into the system and user prompts.
  # Each profile specifies two lists:
  #   system_blocks:  assembled into the system prompt (e.g., role, tone, contract)
  #   user_sections:  assembled into the user prompt (e.g., context, task, scaffolding)
  #
  # Available profiles:
  #   "default"        — full scaffolding + causal contract + tone
  #   "diverse_agents" — no shared scaffolding (reasoning defined in role prompts)
  #   "minimal"        — bare minimum (role + phase + context + task + output)
  #   "no_scaffold"    — keeps tone/PID, removes scaffolding
  #
  # --- Prompt file overrides ---
  # Override which .txt file loads for any prompt block. Paths are relative to
  # multi_agent/prompts/. Only override what you need — defaults apply otherwise.
  #
  # Role overrides (one per agent role):
  #   role_macro, role_value, role_technical, role_risk,
  #   role_sentiment, role_devils_advocate
  #
  # Output format:
  #   output_allocation  — JSON schema + allocation rules
  #
  # Phase templates (user prompt templates for each debate phase):
  #   proposal_template, critique_template, revision_template, judge_template
  #
  # Tone blocks (PID β-driven, 3 buckets × 2 phases = 6 keys):
  #   tone_critique_collaborative, tone_critique_balanced, tone_critique_adversarial
  #   tone_revise_collaborative,   tone_revise_balanced,   tone_revise_adversarial
  #
  # System contract:
  #   causal_contract  — shared causal reasoning contract
  prompt_profile: "diverse_agents"
  prompt_file_overrides:
    role_macro: "roles/macro_diverse.txt"
    role_value: "roles/value_diverse.txt"
    role_technical: "roles/technical_diverse.txt"
    role_risk: "roles/risk_diverse.txt"
    output_allocation: "output_format/allocation_output_diverse.txt"

  # PID enabled
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  # Structured debate logging to logging/runs/<experiment>/run_<timestamp>/
  # Modes:
  #   "off"      — no files written
  #   "standard" — responses, portfolios, critiques, CRIT prompts/scores,
  #                PID metrics, round state (no raw prompts)
  #   "debug"    — everything in standard PLUS prompt.txt files containing
  #                the full system + user prompts sent to each agent in
  #                proposals/, critiques/, revisions/, and final/ subdirs
  logging_mode: "debug"

  # PID + prompt logging
  pid_log_metrics: false          # scalar PID stats each round (rho_bar, beta, JS, etc.)
  pid_log_llm_calls: false       # full CRIT LLM prompts/responses (verbose)
  log_rendered_prompts: false     # emit full prompts via debate.prompts Python logger
  log_prompt_manifest: false      # log prompt file names once per round (compact)

  # Parallel agent execution (max 2 concurrent LLM calls). This setting seems to avoid triggering rate limits
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
