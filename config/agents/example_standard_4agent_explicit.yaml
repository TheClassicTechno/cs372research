# ============================================================================
# Example: Standard 4-Agent Debate — Explicit Default Values
# ============================================================================
# This is the standard 4-agent debate with ALL prompt-related settings
# shown explicitly. Normally you can omit these — they are the defaults.
# This config exists as a reference to show what's happening under the hood.
#
# Run with:
#   python run_simulation.py --agents config/agents/example_standard_4agent_explicit.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  - TSLA
  - NFLX
  - JPM
  - GS
  - BAC
  - UNH
  - LLY
  - JNJ
  - XOM
  - CAT
  - DAL
  - AMT
  - COST
  - WMT

# Allocation constraints enforced on final portfolio output:
#   max_weight:     max fraction any single ticker can receive (0.20 = 20%)
#   min_holdings:   minimum number of tickers with weight > 0
#   fully_invested: if true, weights must sum to 1.0 (no cash reserve)
#   max_tickers:    upper bound on universe size (validation only)
allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 20

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # --- Agent roles ---
  # These are the default 4 roles. Omitting debate_roles gives the same result.
  # Valid roles: macro, value, risk, technical, sentiment, devils_advocate
  debate_roles:
    - macro
    - value
    - technical
    - risk

  max_rounds: 7

  # --- Prompt profile (explicit default) ---
  # Profiles live in multi_agent/prompts/profiles/<name>.yaml and define:
  #   system_blocks:  blocks assembled into the system prompt
  #   user_sections:  sections assembled into the user prompt
  #
  # The "default" profile includes:
  #   system_blocks:  [causal_contract, role_system, phase_preamble, tone]
  #   user_sections:  [preamble, context, agent_data, task, scaffolding, output_format]
  #
  # Available profiles:
  #   "default"        — full scaffolding + causal contract + tone
  #   "diverse_agents" — no shared scaffolding (reasoning defined in role prompts)
  #   "minimal"        — bare minimum (role + phase + context + task + output)
  #   "no_scaffold"    — keeps tone/PID, removes scaffolding
  prompt_profile: "default"

  # --- Prompt file overrides (explicit defaults) ---
  # These are the files that load when NO overrides are specified.
  # Showing them here so you can see what to swap out.
  # All paths are relative to multi_agent/prompts/
  #
  # Role prompt variants available for each role:
  #   Standard:  roles/<role>.txt          (includes inline scaffolding)
  #   Slim:      roles/<role>_slim.txt     (pair with use_system_causal_contract)
  #   Diverse:   roles/<role>_diverse.txt  (self-contained reasoning structure)
  #
  # To create a custom role prompt:
  #   1. Add a new .txt file in multi_agent/prompts/roles/ (e.g., roles/macro_custom.txt)
  #   2. Override it here: role_macro: "roles/macro_custom.txt"
  #   3. The file is auto-discovered by _build_module_catalog() at import time —
  #      no code changes needed.
  #   4. Use any existing role file as a template. Diverse variants
  #      (e.g., roles/macro_diverse.txt) are good starting points since they
  #      are self-contained and don't rely on shared scaffolding.
  prompt_file_overrides:
    # Role prompts — one per agent, defines persona + reasoning style
    role_macro:     "roles/macro.txt"
    role_value:     "roles/value.txt"
    role_technical: "roles/technical.txt"
    role_risk:      "roles/risk.txt"
    # Output format — JSON schema + allocation rules
    output_allocation: "output_format/allocation_output_instructions.txt"
    # Tone blocks — PID β selects one of 3 buckets per phase:
    #   β >= 0.67 → adversarial, 0.33 <= β < 0.67 → balanced, β < 0.33 → collaborative
    # tone_critique_adversarial:   "tone/critique_adversarial.txt"
    # tone_critique_balanced:      "tone/critique_balanced.txt"
    # tone_critique_collaborative: "tone/critique_collaborative.txt"
    # tone_revise_adversarial:     "tone/revise_adversarial.txt"
    # tone_revise_balanced:        "tone/revise_balanced.txt"
    # tone_revise_collaborative:   "tone/revise_collaborative.txt"
    # Phase templates (Jinja user prompt templates for each debate phase):
    # proposal_template: "phases/proposal_allocation.txt"
    # critique_template: "phases/critique_allocation.txt"
    # revision_template: "phases/revision_allocation.txt"
    # judge_template:    "phases/judge_allocation.txt"
    # System contract (shared causal reasoning, used with _slim role prompts):
    # causal_contract: "system_contract/system_causal_contract.txt"

  # --- Agreeableness ---
  # 0.0 = maximally contrarian, 1.0 = maximally agreeable
  # Default is ~0.5. Lower values produce more disagreement in debate.
  agreeableness: 0.5

  # --- PID controller ---
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  # --- Logging ---
  # logging_mode controls file output to logging/runs/<experiment>/run_<timestamp>/
  #   "off"      — no files written
  #   "standard" — responses, portfolios, critiques, CRIT scores, PID metrics
  #   "debug"    — everything in standard + prompt.txt (full system+user prompts)
  logging_mode: "standard"
  pid_log_metrics: true
  pid_log_llm_calls: false
  log_rendered_prompts: false
  log_prompt_manifest: true

  # --- Parallelism ---
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
