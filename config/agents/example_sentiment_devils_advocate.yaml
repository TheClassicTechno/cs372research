# ============================================================================
# Example: Non-Standard Roles — Sentiment + Devil's Advocate + Value
# ============================================================================
# Demonstrates:
#   - Using roles beyond the usual 4 (macro/value/technical/risk)
#   - Adding sentiment and devils_advocate agents
#   - Completely changing the agent roster
#
# Available roles (from AgentRole enum):
#   macro, value, risk, technical, sentiment, devils_advocate
#
# Any combination works. The graph builder dynamically creates propose/
# critique/revise nodes for each role in the list.
#
# Run with:
#   python run_simulation.py --agents config/agents/example_sentiment_devils_advocate.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  - TSLA
  - NFLX
  - JPM
  - UNH
  - XOM

# Allocation constraints enforced on final portfolio output:
#   max_weight:     max fraction any single ticker can receive (0.30 = 30%)
#   min_holdings:   minimum number of tickers with weight > 0
#   fully_invested: if true, weights must sum to 1.0 (no cash reserve)
#   max_tickers:    upper bound on universe size (validation only)
allocation_constraints:
  max_weight: 0.30
  min_holdings: 3
  fully_invested: true
  max_tickers: 10

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # --- Unconventional 3-agent roster ---
  debate_roles:
    - value
    - sentiment
    - devils_advocate

  max_rounds: 3

  # Default profile (includes shared scaffolding — good for standard prompts)
  # Available profiles:
  #   "default"        — full scaffolding + causal contract + tone
  #   "diverse_agents" — no shared scaffolding (reasoning in role prompts)
  #   "minimal"        — bare minimum (role + phase + context + task + output)
  #   "no_scaffold"    — keeps tone/PID, removes scaffolding
  prompt_profile: "default"

  # Standard prompts for sentiment and devils_advocate (no agents variants exist)
  # If you omit prompt_file_overrides for a role, it uses the default:
  #   roles/<role>.txt     (normal mode)
  #   roles/<role>_slim.txt (when use_system_causal_contract: true)
  #
  # You only need to specify overrides for roles you want to customize.
  # prompt_file_overrides:
  #   role_value: "roles/value_diverse.txt"          # swap to agents
  #   role_sentiment: "roles/sentiment.txt"          # (this is already the default)
  #   role_devils_advocate: "roles/devils_advocate.txt"  # (also the default)

  agreeableness: 0.4
  pid_enabled: false

  logging_mode: "debug"

broker:
  initial_cash: 100000.0
