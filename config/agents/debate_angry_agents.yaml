# ============================================================================
# Debate Agent Simulation — Angry Opinionated Agents (2022Q2 Recession Fears)
# ============================================================================
# Four stubborn strategists arguing different macro narratives:
#   macro:     Tech Rebound Bull — Fed breaks inflation, tech recovers
#   value:     Inflation Hawk — structural inflation, energy supercycle
#   risk:      Recession Doom Strategist — hard landing, defensive positioning
#   technical: Soft Landing Optimist — economy slows but avoids recession
#
# Designed for maximally expressive debate behavior with aggressive
# disagreement across all four competing 2022Q2 macro narratives.
#
# Run with:
#   python run_simulation.py --agents config/agents/debate_angry_agents.yaml
#
# ============================================================================
# AGENT DESIGN
# ============================================================================
#
# 1. Tech Rebound Bull (macro role)
#    name: Tech Rebound Bull
#    description: Fed tightening will break inflation, triggering a sharp
#                 recovery in growth equities. The 2022 selloff is a
#                 generational buying opportunity in quality tech.
#    investment_style: aggressive growth, macro regime transition
#    macro_thesis: Fed breaks inflation → tech rebound
#    sector_bias: tech, consumer growth (AAPL, MSFT, NVDA, AMD, AMZN)
#    prompt_personality: dismissive of commodity momentum and recession fears,
#                        confident the selloff is overdone
#
# 2. Inflation Hawk / Energy Supercycle (value role)
#    name: Inflation Hawk
#    description: Inflation is structural due to energy capex underinvestment
#                 and deglobalization. Commodities will dominate for years.
#    investment_style: value, commodity fundamentals
#    macro_thesis: inflation persists → energy dominance
#    sector_bias: energy, commodities, industrials (XOM, CVX, COP, SLB, CAT)
#    prompt_personality: dismissive of "transitory" narratives and tech
#                        valuations, convinced the 2010s rate regime is dead
#
# 3. Recession Doom Strategist (risk role)
#    name: Recession Doom Strategist
#    description: Aggressive tightening always causes recession. Historical
#                 base rate is clear. Defensive positioning is the only
#                 rational strategy.
#    investment_style: capital preservation, recession-proof defensives
#    macro_thesis: recession imminent → defensive positioning
#    sector_bias: defensives, healthcare, staples (WMT, COST, PG, UNH, JNJ)
#    prompt_personality: ruthlessly challenges any risk-on positioning,
#                        treats soft landing as a fantasy with zero base rate
#
# 4. Soft Landing Cyclical Optimist (technical role)
#    name: Soft Landing Cyclical Optimist
#    description: Economy slows but avoids recession. Consumer and labor
#                 markets are resilient. Cyclicals are massively undervalued.
#    investment_style: cyclical value, economic resilience
#    macro_thesis: soft landing → cyclical recovery
#    sector_bias: financials, industrials, transport (JPM, GS, CAT, DAL)
#    prompt_personality: dismissive of recession doom, points to strong
#                        employment data, mocks bears who have been wrong
# ============================================================================

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  - AAPL    # Tech — Tech Rebound Bull
  - MSFT    # Tech — Tech Rebound Bull
  - NVDA    # Tech — Tech Rebound Bull
  - AMZN    # Tech / Consumer — Tech Rebound Bull
  - XOM     # Energy — Inflation Hawk
  - CVX     # Energy — Inflation Hawk
  - COP     # Energy — Inflation Hawk
  - SLB     # Energy Services — Inflation Hawk
  - CAT     # Industrials — Inflation Hawk / Soft Landing
  - WMT     # Consumer Staples — Recession Doom
  - COST    # Consumer Staples — Recession Doom
  - UNH     # Healthcare — Recession Doom
  - JNJ     # Healthcare — Recession Doom
  - JPM     # Financials — Soft Landing
  - GS      # Financials — Soft Landing
  - DAL     # Transport — Soft Landing
  - PG      # Consumer Staples — Recession Doom
  - TSLA    # Consumer / Auto — contested

allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 20

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # 7 debate rounds — angry agents need room to fight
  max_rounds: 7

  # Diverse agents profile — reasoning structure is in the role prompts
  prompt_profile: "diverse_agents"
  prompt_file_overrides:
    role_macro: "roles/macro_angry_tech_bull.txt"
    role_value: "roles/value_angry_inflation_hawk.txt"
    role_risk: "roles/risk_angry_recession_doom.txt"
    role_technical: "roles/technical_angry_soft_landing.txt"
    output_allocation: "output_format/allocation_output_diverse.txt"

  # Minimum agreeableness — maximum contention
  agreeableness: 0.1

  # PID enabled — let the controller manage the chaos
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.7

  # Debug logging to capture the full debate
  logging_mode: "debug"
  pid_log_metrics: false
  pid_log_llm_calls: false
  log_rendered_prompts: false
  log_prompt_manifest: false

  # Parallel agent execution
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
