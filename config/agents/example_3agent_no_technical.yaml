# ============================================================================
# Example: 3-Agent Debate — Macro + Value + Risk (no Technical)
# ============================================================================
# Demonstrates:
#   - Selecting 3 of the 4 standard roles via debate_roles
#   - Using agents role prompts for some agents, standard for others
#   - PID controller with fewer agents
#
# Drops the technical analyst to focus on fundamentals-vs-risk tension.
#
# Run with:
#   python run_simulation.py --agents config/agents/example_3agent_no_technical.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"

tickers:
  - TSLA
  - JPM
  - UNH
  - LLY
  - XOM
  - CAT
  - COST
  - WMT

# Allocation constraints enforced on final portfolio output:
#   max_weight:     max fraction any single ticker can receive (0.25 = 25%)
#   min_holdings:   minimum number of tickers with weight > 0
#   fully_invested: if true, weights must sum to 1.0 (no cash reserve)
#   max_tickers:    upper bound on universe size (validation only)
allocation_constraints:
  max_weight: 0.25
  min_holdings: 4
  fully_invested: true
  max_tickers: 10

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-5-mini"
  temperature: 0.3
  max_retries: 3

  # --- 3 agents: macro, value, risk ---
  debate_roles:
    - macro
    - value
    - risk

  max_rounds: 5

  # Use agents profile but mix prompt variants:
  #   macro → agents (Bayesian regime updating)
  #   value → standard (original value prompt, includes inline scaffolding)
  #   risk  → agents (scenario tree analysis)
  #
  # You can freely mix standard and agents role prompts.
  # Standard prompts: roles/macro.txt, roles/value.txt, etc.
  # Slim prompts:     roles/macro_slim.txt (pair with use_system_causal_contract)
  # Diverse prompts:  roles/macro_diverse.txt (self-contained reasoning)
  prompt_profile: "diverse_agents"
  prompt_file_overrides:
    role_macro: "roles/macro_diverse.txt"
    role_value: "roles/value.txt"          # <-- standard prompt, not agents
    role_risk: "roles/risk_diverse.txt"

  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  logging_mode: "debug"
  pid_log_metrics: false
  pid_log_llm_calls: false

  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
