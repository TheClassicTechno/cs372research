# ============================================================================
# Debate Agent Simulation — 2022Q2 Recession Fears Scenario
# ============================================================================
# Four macro strategists with competing interpretations of the 2022Q2
# environment. Designed to produce persistent narrative disagreement.
#
#   macro:     Growth Rebound Strategist — Fed controls inflation, tech recovers
#   value:     Inflation Persistence Strategist — structural inflation, energy dominance
#   risk:      Recession Strategist — tightening triggers recession, defensives
#   technical: Soft Landing Strategist — economy slows but avoids recession, cyclicals
#
# Designed for use with:
#   config/scenarios/2022Q2_recession_fears.yaml
#
# Run with:
#   python run_simulation.py \
#     --agents config/agents/debate_recession_agents.yaml \
#     --scenario config/scenarios/2022Q2_recession_fears.yaml
#
# ============================================================================
# AGENT ROSTER
# ============================================================================
#
# 1. Inflation Persistence Strategist (value role)
#    name: Inflation Persistence Strategist
#    description: Inflation is structural due to energy capex underinvestment,
#                 labor shortages, and supply chain restructuring. Real assets
#                 outperform financial assets in this regime.
#    prompt_template: agents/recession_fears/inflation_persistence.txt
#    sector_bias: energy, industrials
#    macro_thesis: inflation is structural → energy/commodity outperformance
#
# 2. Recession Strategist (risk role)
#    name: Recession Strategist
#    description: Aggressive monetary tightening will trigger a recession.
#                 Historical base rate for soft landing with CPI > 5% is near
#                 zero. Capital preservation through defensive positioning.
#    prompt_template: agents/recession_fears/recession_strategist.txt
#    sector_bias: defensive, healthcare
#    macro_thesis: tightening triggers recession → defensive outperformance
#
# 3. Soft Landing Strategist (technical role)
#    name: Soft Landing Strategist
#    description: Economy slows but avoids recession. Labor markets are
#                 resilient, corporate balance sheets are healthy. Cyclicals
#                 are massively undervalued due to recession overpricing.
#    prompt_template: agents/recession_fears/soft_landing_strategist.txt
#    sector_bias: financials, industrials, transport
#    macro_thesis: soft landing → cyclical rerating
#
# 4. Growth Rebound Strategist (macro role)
#    name: Growth Rebound Strategist
#    description: The Fed will successfully control inflation. Quality tech
#                 has already de-rated 40-60%. The selloff is a generational
#                 buying opportunity in secular growth.
#    prompt_template: agents/recession_fears/growth_rebound_strategist.txt
#    sector_bias: technology, innovation
#    macro_thesis: inflation peaks → tech rebound via multiple expansion
#
# ============================================================================

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  # Tech — Growth Rebound Strategist
  - AAPL
  - MSFT
  - NVDA
  - AMD
  # Energy — Inflation Persistence Strategist
  - XOM
  - CVX
  - COP
  - SLB
  # Financials — Soft Landing Strategist
  - JPM
  - GS
  - BAC
  - MS
  # Industrials — Soft Landing / Inflation Persistence
  - CAT
  - RTX
  # Consumer / Transport — contested
  - AMZN
  - TSLA
  - DAL
  # Defensive — Recession Strategist
  - WMT
  - COST
  - PG
  # Healthcare — Recession Strategist
  - UNH
  - JNJ

allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 25

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # 7 debate rounds — narrative disagreements need room to develop
  max_rounds: 7

  # Diverse agents profile — all reasoning structure lives in the role prompts
  prompt_profile: "diverse_agents"
  prompt_file_overrides:
    role_macro: "agents/recession_fears/growth_rebound_strategist.txt"
    role_value: "agents/recession_fears/inflation_persistence.txt"
    role_risk: "agents/recession_fears/recession_strategist.txt"
    role_technical: "agents/recession_fears/soft_landing_strategist.txt"
    output_allocation: "output_format/allocation_output_diverse.txt"

  # Low agreeableness — agents should defend their narratives
  agreeableness: 0.15

  # PID enabled
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.6
  pid_epsilon: 0.001

  # Debug logging
  logging_mode: "debug"
  pid_log_metrics: false
  pid_log_llm_calls: false
  log_rendered_prompts: false
  log_prompt_manifest: false

  # Parallel agent execution
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
