# ============================================================================
# Debate Agent Simulation Configuration (Mock Mode)
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/debate_mock.yaml
#
# Uses the multi-agent debate system (Propose → Critique → Revise → Judge)
# in mock mode (no API calls) for testing the full pipeline.

dataset_path: "data/cases"

# Optional: filter case_data items to top N by impact_score at load time.
top_n_news: 5

# Optional: only load cases matching these quarters (e.g. [Q1, Q3]).
# Omit to load all quarters.
# quarters:
#   - Q1

tickers:
  - NVDA
  - AAPL
  - MSFT
  - UBER
  - KO
  - BAC
  - CVX
  - AXP

num_episodes: 20

# --------------------------------------------------------------------------
# Agent Configuration — Multi-Agent Debate
# --------------------------------------------------------------------------
agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # Setting system_prompt_override to "mock" enables mock mode in the
  # debate system (no LLM API calls, deterministic for testing).
  system_prompt_override: "mock"

# --------------------------------------------------------------------------
# Broker Configuration
# --------------------------------------------------------------------------
broker:
  initial_cash: 100000.0
