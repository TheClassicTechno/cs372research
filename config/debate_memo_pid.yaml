# ============================================================================
# Debate Agent Simulation — Memo Allocation + PID Controller (7 rounds)
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/debate_memo_pid.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  - AAPL
  - NVDA
  - MSFT
  - TSLA
  - JPM
  - GOOG
  - AMZN
  - META
  - XOM
  - LLY

allocation_constraints:
  max_weight: 0.40
  min_holdings: 3
  fully_invested: true
  max_tickers: 10

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # 7 debate rounds for PID to have room to adjust
  max_rounds: 7

  # PID enabled
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  # System-level causal contract (consolidates causal scaffolding)
  use_system_causal_contract: true

  # Structured debate logging
  logging_mode: "standard"

  # Logging — see PID metrics and rendered prompts
  pid_log_metrics: true
  pid_log_llm_calls: false
  log_rendered_prompts: false
  log_prompt_manifest: true

broker:
  initial_cash: 100000.0
