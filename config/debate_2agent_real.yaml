# ============================================================================
# Debate Agent Simulation — 2-Agent Real Mode
# ============================================================================
# Run with:
#   python run_simulation.py --agents config/debate_2agent_real.yaml
#
# Minimal real API run: 2 agents (MACRO + VALUE), 1 ticker, 1 quarter.
# Uses gpt-4o-mini for cost efficiency. top_n_news=5 to keep tokens low.

dataset_path: "data/cases"

top_n_news: 5

tickers:
  - NVDA

quarters:
  - Q1

num_episodes: 1

# --------------------------------------------------------------------------
# Agent Configuration — 2-Agent Debate (Real)
# --------------------------------------------------------------------------
agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  debate_roles:
    - macro
    - value

  max_rounds: 2

  pid_enabled: false

# --------------------------------------------------------------------------
# Broker Configuration
# --------------------------------------------------------------------------
broker:
  initial_cash: 100000.0
