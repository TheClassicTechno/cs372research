# ============================================================================
# Debate Agent Simulation — Diverse Agents + PID Controller (7 rounds)
# ============================================================================
# Each agent uses a structurally different reasoning style to maximize
# cognitive diversity in the debate:
#   macro:     Bayesian regime updating (L2 intervention focus)
#   value:     Inversion-first analysis (L3 counterfactual focus)
#   technical: Quantitative signal scoring (L1 association focus)
#   risk:      Scenario tree analysis (L3 counterfactual + override authority)
#
# Run with:
#   python run_simulation.py --config config/debate_diverse_agents.yaml

case_format: "memo"
dataset_path: "data-pipeline/final_snapshots"
memo_format: "text"
invest_quarter: "2025Q1"

tickers:
  - AAPL    # Tech
  - AMZN    # Consumer / Tech
  - META    # Tech / Comm
  - TSLA    # Consumer / Auto
  - NFLX    # Comm / Media
  - JPM     # Financials
  - GS      # Financials
  - BAC     # Financials
  - UNH     # Healthcare
  - LLY     # Healthcare
  - JNJ     # Healthcare
  - XOM     # Energy
  - CAT     # Industrials
  - DAL     # Industrials / Transport
  - AMT     # Real Estate
  - COST    # Consumer Staples
  - WMT     # Consumer Staples

allocation_constraints:
  max_weight: 0.20
  min_holdings: 5
  fully_invested: true
  max_tickers: 20

num_episodes: 1

agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

  # 7 debate rounds for PID to have room to adjust
  max_rounds: 7

  # Diverse agents profile (no shared scaffolding — reasoning in role prompts)
  prompt_profile: "diverse_agents"
  prompt_file_overrides:
    role_macro: "roles/macro_diverse.txt"
    role_value: "roles/value_diverse.txt"
    role_technical: "roles/technical_diverse.txt"
    role_risk: "roles/risk_diverse.txt"
    output_allocation: "output_format/allocation_output_diverse.txt"

  # Lower agreeableness to complement anti-convergence rules
  agreeableness: 0.2

  # PID enabled
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5
  pid_epsilon: 0.001

  # Structured debate logging
  logging_mode: "standard"

  # Logging
  pid_log_metrics: true
  pid_log_llm_calls: false
  log_system_prompts: true
  log_user_prompts: false
  log_llm_responses: false
  log_rendered_prompts: false
  log_prompt_manifest: true

  # Parallel agent execution (max 2 concurrent LLM calls)
  parallel_agents: true
  llm_stagger_ms: 500
  max_concurrent_llm: 2

broker:
  initial_cash: 100000.0
