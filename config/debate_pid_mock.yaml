# ============================================================================
# Debate Agent Simulation — PID-Enabled Mock Mode
# ============================================================================
# Run with:
#   python run_simulation.py --config config/debate_pid_mock.yaml
#
# Tests the full PID pipeline (adapter → DebateConfig → PIDController)
# in mock mode (no API calls). CRIT scorer will log warnings because
# mock LLM returns "{}" which isn't valid CRIT JSON — this is expected.
# The goal is to verify PID plumbing, not PID behavior.

dataset_path: "data/cases"

top_n_news: 5

tickers:
  - NVDA

quarters:
  - Q1

num_episodes: 1

# --------------------------------------------------------------------------
# Agent Configuration — Multi-Agent Debate with PID
# --------------------------------------------------------------------------
agent:
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3
  system_prompt_override: "mock"

  # Debate structure — PID needs multiple rounds to intervene between them
  max_rounds: 3

  # PID enabled — this is the key setting we're testing
  pid_enabled: true
  pid_kp: 0.15
  pid_ki: 0.01
  pid_kd: 0.03
  pid_rho_star: 0.8
  pid_initial_beta: 0.5

  # Logging — enable to see PID metrics in output
  pid_log_metrics: true
  pid_log_llm_calls: false
  log_system_prompts: false
  log_user_prompts: false
  log_llm_responses: false

# --------------------------------------------------------------------------
# Broker Configuration
# --------------------------------------------------------------------------
broker:
  initial_cash: 100000.0
