# ============================================================================
# Debate Agent Simulation Configuration
# ============================================================================
# Run with:
#   python run_simulation.py --config config/debate.yaml
#
# Uses the multi-agent debate system (Propose → Critique → Revise → Judge)
# with 4 specialist agents: MACRO, VALUE, RISK, TECHNICAL.
#
# For mock mode (no API calls), use config/debate_mock.yaml instead.

dataset_path: "data/cases"

tickers:
  - NVDA

num_episodes: 1

# --------------------------------------------------------------------------
# Agent Configuration — Multi-Agent Debate
# --------------------------------------------------------------------------
agent:
  # Registered as "multi_agent_debate" per integration_plan.md §5.
  agent_system: "multi_agent_debate"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  temperature: 0.3
  max_retries: 3

# --------------------------------------------------------------------------
# Broker Configuration
# --------------------------------------------------------------------------
broker:
  initial_cash: 100000.0
