# Diverse-agents profile: removes shared scaffolding so each role prompt
# defines its own reasoning structure. Keeps tone for PID beta-control.
#
# Use with prompt_file_overrides to swap role prompts for *_diverse.txt variants.
# See config/debate_diverse_agents.yaml for a complete example.

system_blocks:
  propose:  [role_system]
  critique: [role_system, phase_preamble, tone]
  revise:   [role_system, phase_preamble, tone]
  judge:    [judge_system]

user_sections:
  propose:  [context, task, output_format]
  critique: [preamble, context, agent_data, task, output_format]
  revise:   [preamble, context, agent_data, task, output_format]
  judge:    [preamble, context, agent_data, task, output_format]
